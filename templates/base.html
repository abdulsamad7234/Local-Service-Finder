{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{% block title %}Local Service Finder{% endblock %}</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

    <!-- Tailwind (CDN for simplicity) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
            },
            colors: {
              brand: {
                500: "#2563eb",
                600: "#1d4ed8",
              },
            },
          },
        },
      };
    </script>

    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>

  <body class="min-h-screen bg-slate-50 text-slate-800">

    <!-- NAVBAR -->
    <nav class="border-b bg-slate-900 text-white">
      <div class="mx-auto flex max-w-7xl flex-wrap items-center justify-between px-4 py-4 sm:px-6 lg:px-8">

        <a href="{% url 'services:home' %}" class="text-lg font-semibold">
          Local Service Finder
        </a>

        <div class="flex flex-wrap gap-2 text-sm">

          <a href="{% url 'services:home' %}"
             class="px-3 py-1 text-slate-300 hover:text-white">
            Home
          </a>

          <a href="{% url 'services:service_list' %}"
             class="px-3 py-1 text-slate-300 hover:text-white">
            Services
          </a>

          <a href="{% url 'services:service_create' %}"
             class="px-3 py-1 bg-brand-600 text-white rounded hover:bg-brand-700">
            Add
          </a>

          <a href="{% url 'services:about' %}"
             class="px-3 py-1 text-slate-300 hover:text-white">
            About
          </a>

        </div>
      </div>
    </nav>

    <!-- MESSAGES -->
    {% if messages %}
      <div class="mx-auto mt-4 max-w-7xl px-4 sm:px-6 lg:px-8">
        {% for message in messages %}
          <div class="mb-3 rounded border border-green-200 bg-green-50 px-4 py-2 text-sm text-green-700">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}

    <!-- MAIN CONTENT -->
    <main class="pb-12">
      {% block content %}{% endblock %}
    </main>

    <!-- FOOTER -->
    <footer class="mt-10 border-t bg-white">
      <div class="mx-auto max-w-7xl px-4 py-6 text-sm text-slate-600 sm:px-6 lg:px-8 flex flex-col gap-1 sm:flex-row sm:justify-between">
        <p>© 2026 Local Service Finder</p>
        <p>Built by Abdul Samad</p>
      </div>
    </footer>

  </body>
</html>
